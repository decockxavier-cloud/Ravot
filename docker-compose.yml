# Coolify-compatibel. LET OP: nooit de pgdata-mapnaam wijzigen of wissen.
services:
  web:
    build: .
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [db]
    restart: unless-stopped
    volumes:
      - ravot_uploads:/data/uploads   # gebruikersfoto's, persistent over rebuilds
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ravot
      POSTGRES_PASSWORD: ravot
      POSTGRES_DB: ravot
    volumes:
      - ravot_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama   # modellen blijven bewaard over rebuilds heen
    restart: unless-stopped
    # Geen poort naar buiten: enkel intern bereikbaar als http://ollama:11434
volumes:
  ravot_pgdata:
  ollama_models:
  ravot_uploads:
