{% extends "base.html" %}
{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
{% endblock %}
{% block body_class %}met-sfeer{% endblock %}
{% block content %}
<h1>Verkennen</h1>
<p class="hint">Tik op een speldje voor meer info. Sleep de kaart om ergens anders te kijken.</p>
<div class="kaart-legende">
  <span><i class="leg-bol" style="background:#2E7D46"></i> 😄 goed gescoord</span>
  <span><i class="leg-bol" style="background:#F4B233"></i> 🎈 gratis</span>
  <span><i class="leg-bol" style="background:#5B8DEF"></i> 🏠 binnen</span>
  <span><i class="leg-bol" style="background:#EE8035"></i> 📍 andere</span>
</div>
<div id="map" role="application" aria-label="Kaart met kinderactiviteiten"
     data-center="{{ center|tojson|forceescape }}"
     data-markers="{{ markers|tojson|forceescape }}"></div>
<script type="application/json" id="map-data">{{ {"center": center, "markers": markers}|tojson|safe }}</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="{{ url_for('static', filename='js/verkennen.js') }}" defer></script>
{% endblock %}
