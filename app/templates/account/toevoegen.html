{% extends "base.html" %}
{% block content %}
<h1>Een plek toevoegen 📍</h1>
<p class="intro">Ken je een leuke plek die nog niet op Ravot staat? Voeg ze toe!
  We kijken elke inzending even na voor ze verschijnt.</p>

<form method="post" action="{{ url_for('account.toevoegen') }}" class="kaart-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <label>Naam van de plek *
    <input type="text" name="titel" required maxlength="255" placeholder="bv. Speelbos De Warande">
  </label>

  <label>Wat is het? Kies één of meer categorieën
    <span class="hulp"></span>
  </label>
  <div class="checkrij">
    {% for c in categories %}
      <label class="check"><input type="checkbox" name="categorie" value="{{ c }}"> {{ c }}</label>
    {% endfor %}
  </div>

  <div class="veldrij">
    <label>Postcode
      <input type="text" name="postcode" inputmode="numeric" maxlength="40" placeholder="9000" data-plaatsen data-zelf="postcode" data-vul-gemeente="input[name=gemeente]">
    </label>
    <label>Gemeente
      <input type="text" name="gemeente" maxlength="80" placeholder="Gent">
    </label>
  </div>

  <label>Adres (straat + nummer)
    <input type="text" name="adres" maxlength="255" placeholder="Jan Breydelstraat 5">
  </label>

  <label style="margin-bottom:4px">Of prik de plek op de kaart 📍
    <span class="hint" style="font-weight:normal">Tik op de juiste plaats —
    de speld mag je verslepen. Gemeente en postcode vullen we dan zelf in.</span>
  </label>
  <div id="prik-kaart" class="prik-kaart"></div>
  <div class="acties" style="margin:6px 0 10px">
    <button type="button" class="btn btn-stil btn-klein" id="prik-hier">📍 Gebruik mijn locatie</button>
    <span class="hint" id="prik-status">nog geen speld gezet</span>
  </div>
  <input type="hidden" name="lat" id="prik-lat">
  <input type="hidden" name="lng" id="prik-lng">
  <label style="display:none">
  </label>

  <div class="veldrij">
    <label>Vanaf leeftijd
      <input type="number" name="age_min" min="0" max="18" value="0">
    </label>
    <label>Tot leeftijd
      <input type="number" name="age_max" min="0" max="18" value="12">
    </label>
  </div>

  <div class="checkrij">
    <label class="check"><input type="checkbox" name="indoor"> 🏠 Binnen</label>
    <label class="check"><input type="checkbox" name="gratis"> 🆓 Gratis</label>
  </div>

  <label>Website (optioneel)
    <input type="url" name="website" maxlength="500" placeholder="https://...">
  </label>

  <label>Korte beschrijving (optioneel)
    <textarea name="beschrijving" maxlength="2000" rows="4"
              placeholder="Wat maakt deze plek leuk voor kinderen?"></textarea>
  </label>

  <div class="acties"><button class="btn btn-zon" type="submit">Plek indienen</button></div>
</form>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="{{ url_for('static', filename='js/prik.js') }}" defer></script>
{% endblock %}
