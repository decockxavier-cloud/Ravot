{% extends "base.html" %}
{% block content %}
<h1>Kijk in je mailbox 📬</h1>
<div class="card">
  <p>We stuurden een inloglink naar <strong>{{ email }}</strong>. Die blijft 15 minuten geldig en werkt één keer.</p>
  <p class="hint">Niets ontvangen? Kijk even bij ongewenste mail, of vraag over een paar minuten een nieuwe link aan.</p>
</div>
{% endblock %}
